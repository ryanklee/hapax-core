# Document Registry — consumed by drift_detector for coverage enforcement.
#
# Defines document archetypes, per-repo required documents, CI-to-document
# coverage rules, and cross-repo mutual awareness constraints.
#
# Formal foundations:
#   - CMDB: CIs with typed relationships to documentation
#   - DITA: Document archetypes with required structural sections
#   - ADR: Design records as a first-class archetype
#
# See: docs/plans/2026-03-09-document-registry-design.md
#
# Updated 2026-03-13: migrated from old repo names (ai-agents, hapaxromana,
# hapax-system, cockpit-web) to current 4-repo structure.

version: 2

# ── Document archetypes ──────────────────────────────────────────────
archetypes:
  project-context:
    description: "Per-repo working context for Claude Code sessions"
    required_sections:
      - "## Conventions"
    composite: true
  specification:
    description: "Architectural design, invariants, contracts"
    required_sections: []
    composite: false
  reference:
    description: "Canonical lookup tables, single source of truth"
    required_sections: []
    composite: false
  operational:
    description: "Procedures, workflows, troubleshooting"
    required_sections: []
    composite: false
  governance:
    description: "Axioms, rules, constraints, boundaries"
    required_sections: []
    composite: false
  design-record:
    description: "Point-in-time design decisions"
    required_sections: []
    composite: false

# ── Repo declarations ────────────────────────────────────────────────
repos:
  hapax-council:
    path: ~/projects/hapax-council
    required_docs:
      - path: CLAUDE.md
        archetype: project-context
      - path: README.md
        archetype: project-context
      - path: agents/hapax_voice/README.md
        archetype: specification
      - path: agents/hapax_voice/LAYER_STATUS.yaml
        archetype: reference
    ci_sources:
      agents: "agents/"
      hooks: "hooks/scripts/"

  hapax-officium:
    path: ~/projects/hapax-officium
    required_docs:
      - path: CLAUDE.md
        archetype: project-context
      - path: README.md
        archetype: project-context
      - path: agent-architecture.md
        archetype: specification
      - path: operations-manual.md
        archetype: operational
      - path: CONTRIBUTING.md
        archetype: reference
      - path: SECURITY.md
        archetype: governance
    ci_sources:
      agents: "agents/"

  hapax-constitution:
    path: ~/projects/hapax-constitution
    required_docs:
      - path: CLAUDE.md
        archetype: project-context
      - path: README.md
        archetype: project-context
      - path: pattern-guide.md
        archetype: specification
      - path: operations-manual.md
        archetype: operational
      - path: axioms/registry.yaml
        archetype: governance
    ci_sources: {}

  distro-work:
    path: ~/projects/distro-work
    required_docs:
      - path: CLAUDE.md
        archetype: project-context

# ── Coverage rules ───────────────────────────────────────────────────
# "For every CI of type X, there must be a reference in document Y."
coverage_rules:
  - ci_type: agent
    reference_doc: ~/projects/hapax-council/CLAUDE.md
    reference_section: "## Key Modules"
    match_by: name
    severity: medium
    description: "Every council agent must be referenced in CLAUDE.md"

  - ci_type: agent
    reference_doc: ~/projects/hapax-officium/CLAUDE.md
    reference_section: "## Agents"
    match_by: name
    severity: medium
    description: "Every officium agent must be referenced in CLAUDE.md"

  - ci_type: timer
    reference_doc: ~/projects/hapax-council/CLAUDE.md
    match_by: name
    severity: low
    description: "Every systemd timer should be documented in council CLAUDE.md"

  - ci_type: service
    reference_doc: ~/projects/hapax-council/CLAUDE.md
    match_by: name
    severity: medium
    description: "Every Docker service must be documented in council CLAUDE.md"

  - ci_type: repo
    reference_doc: ~/projects/hapax-constitution/README.md
    match_by: name
    severity: medium
    description: "Every hapax repo must appear in the constitution README"

# ── Mutual awareness ────────────────────────────────────────────────
mutual_awareness:
  # All repos should reference the constitution as governance source
  - type: spec_reference
    description: "Every repo should reference hapax-constitution as governance source"
    target_phrase: "hapax-constitution"
    severity: low

  # Cross-project boundary doc must be identical across repos that have it
  - type: byte_identical
    description: "Cross-project boundary doc must be identical in constitution and officium"
    docs:
      - ~/projects/hapax-constitution/docs/cross-project-boundary.md
      - ~/projects/hapax-officium/docs/cross-project-boundary.md
    severity: high

  # Workflow enforcement directive must be present in all repos
  - type: spec_reference
    description: "All repos must have the PR-before-moving-on directive"
    target_phrase: "Always PR completed work before moving on"
    severity: high
