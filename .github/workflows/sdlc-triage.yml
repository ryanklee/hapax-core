name: "SDLC: Issue Triage"

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

concurrency:
  group: sdlc-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.event.label.name == 'agent-eligible'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
      - run: uv sync

      - name: Run triage agent
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_EXPORT_FILE: /tmp/langfuse-traces.jsonl
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -eo pipefail
          OUTPUT=$(uv run python -m scripts.sdlc_triage --issue-number "$ISSUE")
          echo "$OUTPUT"

          # Parse structured output.
          TYPE=$(echo "$OUTPUT" | jq -r '.type')
          COMPLEXITY=$(echo "$OUTPUT" | jq -r '.complexity')
          REJECT=$(echo "$OUTPUT" | jq -r '.reject_reason // empty')

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "complexity=$COMPLEXITY" >> "$GITHUB_OUTPUT"
          echo "reject=$REJECT" >> "$GITHUB_OUTPUT"

      - name: Handle rejection
        if: steps.triage.outputs.reject != '' || steps.triage.outputs.complexity == 'L'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ steps.triage.outputs.reject }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ -z "$REASON" ]; then
            REASON="Complexity is L -- requires human implementation."
          fi
          gh issue comment "$ISSUE" --body "## Triage Result: Not Agent-Eligible

          **Reason:** $REASON

          This issue has been flagged for human attention."

          gh issue edit "$ISSUE" \
            --add-label "needs-human" \
            --remove-label "agent-eligible"

      - name: Handle acceptance
        if: steps.triage.outputs.reject == '' && steps.triage.outputs.complexity != 'L'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          TRIAGE_TYPE: ${{ steps.triage.outputs.type }}
          TRIAGE_COMPLEXITY: ${{ steps.triage.outputs.complexity }}
        run: |
          gh issue edit "$ISSUE" \
            --add-label "sdlc:triaged" \
            --add-label "triage:${TRIAGE_TYPE}" \
            --add-label "complexity:${TRIAGE_COMPLEXITY}"

          gh issue comment "$ISSUE" --body "## Triage Result

          - **Type:** ${TRIAGE_TYPE}
          - **Complexity:** ${TRIAGE_COMPLEXITY}
          - **Status:** Triaged, queued for planning."

      - name: Dispatch to implementation
        if: steps.triage.outputs.reject == '' && steps.triage.outputs.complexity != 'L'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh api "repos/${REPO}/dispatches" \
            -X POST -f event_type=sdlc-plan \
            -f "client_payload[issue_number]=${ISSUE}"

      - name: Handle error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue edit "$ISSUE" \
            --add-label "needs-human" \
            --remove-label "agent-eligible"
          gh issue comment "$ISSUE" --body "## Triage Failed

          The triage agent encountered an error. See [workflow run](${WORKFLOW_URL}) for details."

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: langfuse-traces-triage-${{ github.event.issue.number }}
          path: /tmp/langfuse-traces.jsonl
          if-no-files-found: ignore
