name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 3 --allowedTools Read,Glob,Grep"
          prompt: |
            Review this PR to the hapax-constitution specification repository.

            This repo defines the canonical axiom system used by hapax-council
            and hapax-officium. Changes here affect governance across all projects.

            Check for:
            - YAML validity in axioms/, domains/, knowledge/ files
            - Axiom weight consistency (higher weight = more restrictive)
            - Implication tier correctness (T0 = existential block, T1 = review, T2 = warn)
            - Cross-reference consistency (implications reference valid axiom IDs)
            - Documentation accuracy (do docs match the YAML definitions?)
            - Precedent seed quality (are seed precedents well-reasoned?)

            Be specific about any inconsistencies found.

            At the END of your review, you MUST output exactly one of these lines:
            VERDICT: APPROVE
            VERDICT: REQUEST_CHANGES

            Use APPROVE if there are no HIGH findings. Use REQUEST_CHANGES only for HIGH findings.

      - name: Generate app token
        if: always() && steps.claude.outcome == 'success'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEW_APP_ID }}
          private-key: ${{ secrets.REVIEW_APP_KEY }}

      - name: Submit review verdict
        if: always() && steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot")] | last | .body // ""')

          if echo "$COMMENTS" | grep -q "VERDICT: REQUEST_CHANGES"; then
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=REQUEST_CHANGES -f body="Claude review found issues requiring changes."
          else
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=APPROVE -f body="Claude review passed — no high-severity findings."
          fi
