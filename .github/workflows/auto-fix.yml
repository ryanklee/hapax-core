name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      !contains(github.event.workflow_run.head_commit.message, '[auto-fix]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check auto-fix attempt count (circuit breaker)
        id: guard
        run: |
          # E-4: Use circuit_breaker.py instead of git log grep
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          CHECK_NAME="auto-fix:${BRANCH}"
          RESULT=$(python -c "
          import sys; sys.path.insert(0, '.')
          from sdlc.circuit_breaker import CircuitBreaker
          cb = CircuitBreaker(max_attempts=3, window_seconds=86400)
          if cb.is_tripped('${CHECK_NAME}'):
              print('tripped')
          else:
              remaining = cb.remaining_attempts('${CHECK_NAME}')
              cb.record_attempt('${CHECK_NAME}')
              print(f'ok:{remaining}')
          ")
          if [[ "$RESULT" == "tripped" ]]; then
            echo "::warning::Auto-fix circuit breaker tripped for ${BRANCH}. Labeling for human review."
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            echo "auto_fix_count=3" >> "$GITHUB_OUTPUT"
          else
            REMAINING="${RESULT#ok:}"
            COUNT=$((3 - REMAINING))
            echo "should_fix=true" >> "$GITHUB_OUTPUT"
            echo "auto_fix_count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Label PR for human review
        if: steps.guard.outputs.should_fix == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human"
          fi

      - name: Download CI logs
        if: steps.guard.outputs.should_fix == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/ci-failure.log 2>&1 || true

      - name: Check failure scope
        if: steps.guard.outputs.should_fix == 'true'
        id: scope
        run: |
          LOG="/tmp/ci-failure.log"
          FIXABLE=false
          if grep -qE '(yamllint|ruff)' "$LOG" 2>/dev/null; then
            FIXABLE=true
          fi
          echo "fixable=$FIXABLE" >> "$GITHUB_OUTPUT"

      - name: Label unfixable PR
        if: steps.guard.outputs.should_fix == 'true' && steps.scope.outputs.fixable == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human"
          fi

      - name: Run Claude Code auto-fix
        if: steps.guard.outputs.should_fix == 'true' && steps.scope.outputs.fixable == 'true'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 3 --allowedTools Bash,Read,Edit,Write"
          prompt: |
            The YAML lint check failed. Fix ONLY yamllint errors in axioms/, domains/, knowledge/.
            Run `yamllint -d relaxed axioms/ domains/ knowledge/` to identify issues.
            Do NOT modify axiom definitions in axioms/registry.yaml.
            Make minimal changes.

      - name: Commit auto-fix
        if: steps.guard.outputs.should_fix == 'true' && steps.scope.outputs.fixable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit — Claude could not fix the issue."
            PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              gh pr edit "$PR_NUMBER" --add-label "needs-human"
            fi
          else
            git add -A
            git commit -m "[auto-fix] resolve yamllint errors

          Automated fix by Claude Code. See CI logs for details.

          Co-Authored-By: Claude Sonnet <noreply@anthropic.com>"
            git push
          fi

      - name: Write job summary
        if: always()
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.start.outputs.time }} ))
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Auto-Fix Summary

          | Field | Value |
          |-------|-------|
          | Branch | ${{ github.event.workflow_run.head_branch }} |
          | Triggering run | ${{ github.event.workflow_run.id }} |
          | Attempt | ${{ steps.guard.outputs.auto_fix_count }} / 3 |
          | Fixable | ${{ steps.scope.outputs.fixable || 'skipped' }} |
          | Outcome | ${{ job.status }} |
          | Duration | ${DURATION}s |
          EOF

      - name: Upload CI failure log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-log-${{ github.event.workflow_run.head_branch }}
          path: /tmp/ci-failure.log
          if-no-files-found: ignore

      - name: Notify via ntfy
        if: always() && vars.NTFY_TOPIC != ''
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            PRIORITY="default"
            TAGS="white_check_mark,robot"
          else
            PRIORITY="high"
            TAGS="x,robot"
          fi
          curl -sf \
            -H "Title: Auto-Fix ${STATUS}" \
            -H "Priority: ${PRIORITY}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Branch ${{ github.event.workflow_run.head_branch }} — ${STATUS} (attempt ${{ steps.guard.outputs.auto_fix_count }}/3)" \
            "https://ntfy.sh/${{ vars.NTFY_TOPIC }}" || true
